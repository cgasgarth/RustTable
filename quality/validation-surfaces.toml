[budgets]
prepush = 150
main = 2700

[[checks]]
id = "diff"
label = "diff"
program = "git"
args = ["diff", "--check"]
owner = "repository"
surfaces = ["precommit", "prepush", "main"]
parallel_group = "repository"
network = "none"
platforms = ["all"]
severity = "error"

[[checks]]
id = "fmt"
label = "fmt"
program = "cargo"
args = ["fmt", "--all", "--", "--check"]
owner = "workspace"
surfaces = ["precommit", "prepush", "main"]
parallel_group = "rust"
network = "none"
platforms = ["all"]
severity = "error"

[[checks]]
id = "metadata"
label = "metadata"
program = "cargo"
args = ["metadata", "--locked", "--no-deps", "--format-version", "1"]
owner = "workspace"
surfaces = ["precommit", "prepush", "main"]
parallel_group = "rust"
network = "none"
platforms = ["all"]
severity = "error"

[[checks]]
id = "rust-build-all"
label = "rust-build-all"
program = "cargo"
args = ["build", "--workspace", "--all-targets", "--all-features", "--locked"]
owner = "workspace"
surfaces = ["precommit", "main"]
parallel_group = "rust-heavy"
resources = ["cargo-target-dir"]
network = "none"
platforms = ["all"]
severity = "error"

[[checks]]
id = "rust-clippy"
label = "rust-clippy"
program = "cargo"
args = ["clippy", "--workspace", "--lib", "--all-features", "--locked", "--no-deps", "--", "-D", "warnings"]
owner = "workspace"
surfaces = ["prepush", "main"]
parallel_group = "rust"
resources = ["cargo-target-dir"]
prerequisites_by_surface = { prepush = ["rust-test"] }
parallel_group_by_surface = { prepush = "rust-02-clippy" }
network = "none"
platforms = ["all"]
severity = "error"

[[checks]]
id = "rust-test"
label = "rust-test"
program = "cargo"
args = ["test", "--workspace", "--lib", "--all-features", "--locked", "--", "--test-threads=16"]
owner = "workspace"
surfaces = ["prepush", "main"]
parallel_group = "rust"
resources = ["cargo-target-dir"]
parallel_group_by_surface = { prepush = "rust-01-test" }
network = "none"
platforms = ["all"]
severity = "error"

[[checks]]
id = "rust-test-all"
label = "rust-test-all"
program = "cargo"
args = ["test", "--workspace", "--all-targets", "--all-features", "--locked"]
owner = "workspace"
surfaces = ["precommit", "main"]
parallel_group = "rust-heavy"
resources = ["cargo-target-dir"]
network = "none"
platforms = ["all"]
severity = "error"

