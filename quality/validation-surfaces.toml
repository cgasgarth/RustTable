[budgets]
precommit = 30
prepush = 150
pull_request = 150
main = 2700

[[checks]]
id = "diff"
label = "diff"
program = "git"
args = ["diff", "--check"]
owner = "repository"
surfaces = ["precommit", "prepush", "pull_request", "main"]
parallel_group = "repository"
timeout_seconds = 3
network = "none"
platforms = ["all"]
severity = "error"

[[checks]]
id = "fmt"
label = "fmt"
program = "cargo"
args = ["fmt", "--all", "--", "--check"]
owner = "workspace"
surfaces = ["precommit", "prepush", "pull_request", "main"]
parallel_group = "rust"
timeout_seconds = 5
network = "none"
platforms = ["all"]
severity = "error"

[[checks]]
id = "metadata"
label = "metadata"
program = "cargo"
args = ["metadata", "--locked", "--no-deps", "--format-version", "1"]
owner = "workspace"
surfaces = ["precommit", "prepush", "pull_request", "main"]
parallel_group = "rust"
timeout_seconds = 5
network = "none"
platforms = ["all"]
severity = "error"

[[checks]]
id = "rust-check"
label = "rust-check"
program = "cargo"
args = ["check", "--workspace", "--lib", "--all-features", "--locked"]
owner = "workspace"
surfaces = ["precommit", "prepush", "pull_request", "main"]
parallel_group = "rust"
parallel_group_by_surface = { prepush = "rust-01-check", pull_request = "rust-01-check" }
timeout_seconds = 20
timeout_seconds_by_surface = { prepush = 60, pull_request = 60 }
network = "none"
platforms = ["all"]
severity = "error"

[[checks]]
id = "rust-clippy"
label = "rust-clippy"
program = "cargo"
args = ["clippy", "--workspace", "--lib", "--all-features", "--locked", "--", "-D", "warnings"]
owner = "workspace"
surfaces = ["precommit", "prepush", "pull_request", "main"]
parallel_group = "rust"
prerequisites_by_surface = { prepush = ["rust-check"], pull_request = ["rust-check"] }
parallel_group_by_surface = { prepush = "rust-02-clippy", pull_request = "rust-02-clippy" }
timeout_seconds = 20
timeout_seconds_by_surface = { prepush = 20, pull_request = 20 }
network = "none"
platforms = ["all"]
severity = "error"

[[checks]]
id = "rust-test"
label = "rust-test"
program = "cargo"
args = ["test", "--workspace", "--lib", "--all-features", "--locked"]
owner = "workspace"
surfaces = ["precommit", "prepush", "pull_request", "main"]
parallel_group = "rust"
prerequisites_by_surface = { prepush = ["rust-clippy"], pull_request = ["rust-clippy"] }
parallel_group_by_surface = { prepush = "rust-03-test", pull_request = "rust-03-test" }
timeout_seconds = 20
timeout_seconds_by_surface = { prepush = 55, pull_request = 55 }
network = "none"
platforms = ["all"]
severity = "error"

[[checks]]
id = "rust-test-all"
label = "rust-test-all"
program = "cargo"
args = ["test", "--workspace", "--all-targets", "--all-features", "--locked"]
owner = "workspace"
surfaces = ["main"]
parallel_group = "rust-heavy"
timeout_seconds = 45
network = "none"
platforms = ["all"]
severity = "error"
merge_only = true

[[checks]]
id = "rust-clippy-all"
label = "rust-clippy-all"
program = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--all-features", "--locked", "--", "-D", "warnings"]
owner = "workspace"
surfaces = ["main"]
parallel_group = "rust-heavy"
timeout_seconds = 45
network = "none"
platforms = ["all"]
severity = "error"
merge_only = true

