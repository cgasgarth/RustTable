# Generated/reconciled ecosystem receipt for the pinned Rust 1.98 beta baseline.
schema = "rusttable.ecosystem-baseline.v2"
rust_channel = "beta-2026-07-17"
rust_release = "1.98.0-beta.4"
edition = "2024"
rust_version = "1.98"
compiler_receipt = "quality/compiler-baseline.toml"
dependency_policy = "quality/dependency-sources.toml"
workspace_manifest = "Cargo.toml"
lockfile = "Cargo.lock"

[frameworks.iced]
source = "https://github.com/iced-rs/iced.git"
version = "=0.15.0-dev"
rev = "56b706fcd35aa881baede77a696bbb842773fdc6"
features = ["advanced", "sipper", "thread-pool", "tiny-skia", "wgpu"]
platform_features = "x11-on-linux-only; wayland-and-x11-derived-by-target"

[compiler]
moving_channel = false
nightly_product_code = false
required_components = ["clippy", "rust-docs", "rust-src", "rustfmt", "llvm-tools-preview"]
targets = ["x86_64-unknown-linux-gnu", "aarch64-apple-darwin", "x86_64-pc-windows-msvc"]
profile = "minimal"
config_identity = "rust-toolchain.toml selects the primary toolchain"

[dependency_policy_contract]
direct_versions = "exact"
shared_versions = "workspace.dependencies"
git_sources = "immutable-rev-only"
path_sources = "workspace-local-only"
lockfile_required = true
advisory_policy = "cargo-audit-and-cargo-deny-pinned-reports"
native_policy = "explicit-owner-required"

[features]
unstable_product_features = false
nightly_tooling_in_product_graph = false
warnings = "deny"

[capabilities]
stable = ["cargo-warnings-deny", "rustdoc-remap-path-prefix", "target-has-atomic-primitive-alignment"]
beta = ["rust-1.98-beta-baseline"]
nightly_lab = []

[[capabilities.records]]
id = "rust-1.98-beta-baseline"
status = "adopted"
owner_issue = 517
evidence = "quality/compiler-baseline.toml; rust-toolchain.toml"
minimum_version = "1.98.0-beta.4"
target_scope = "product compiler"
rationale = "The product intentionally adopts the dated beta until a dedicated baseline issue changes it."

[[capabilities.records]]
id = "nightly-product-code"
status = "rejected"
owner_issue = 517
evidence = "quality/ecosystem-baseline.toml.features"
minimum_version = "none"
target_scope = "product graph"
rationale = "Nightly-only product APIs and feature gates remain prohibited."

[[capabilities.records]]
id = "raw-decoder-stack"
status = "deferred"
owner_issue = 168
