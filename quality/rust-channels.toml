schema = "rusttable.rust-channels.v1"
authoritative = "primary-beta"
product_artifacts = ["primary-beta"]

[[channels]]
id = "primary-beta"
source = "date-pinned"
toolchain = "beta-2026-07-17"
archive = "https://static.rust-lang.org/dist/2026-07-17/"
release_line = "1.98"
stabilization_date = "2026-08-20"
gating = "product"
update_cadence = "explicit-refresh-pr"
moving = false
required_components = ["clippy", "rust-docs", "rust-src", "rustfmt", "llvm-tools-preview"]
targets = ["x86_64-unknown-linux-gnu", "aarch64-apple-darwin", "x86_64-pc-windows-msvc"]
commands = ["cargo check --workspace --all-features --locked", "cargo test --workspace --all-targets --all-features --locked", "cargo clippy --workspace --all-targets --all-features --locked -- -D warnings", "cargo doc --workspace --all-features --locked --no-deps"]

