[[labs]]
id = "native-boundary-sanitizers-0168"
owner_issue = 168
owner = "rusttable-simd"
feature_gates = []
allowed_unstable_flags = ["-Zsanitizer=address", "-Zsanitizer=leak", "-Zsanitizer=thread"]
package = "rusttable-simd"
target = "adapter-allocation-callback-races"
commands = ["RUSTFLAGS=-Zsanitizer=address cargo +nightly-2026-07-15 test -p rusttable-simd --lib --locked", "RUSTFLAGS=-Zsanitizer=leak cargo +nightly-2026-07-15 test -p rusttable-simd --lib --locked", "RUSTFLAGS=-Zsanitizer=thread cargo +nightly-2026-07-15 test -p rusttable-simd --lib --locked"]
outputs = ["target/compiler-channels/labs/native-boundary-sanitizers-0168.json"]
platforms = ["x86_64-unknown-linux-gnu", "aarch64-apple-darwin"]
resource_timeout_seconds = 150
resource_memory_mb = 4096
expected_exclusions = ["unsupported sanitizer/target pairs are capability results", "no adapter C code is currently registered"]
artifact_retention_days = 14
promotion_condition = "an approved native adapter or SIMD unsafe helper is present on a supported target"
removal_condition = "remove when adapter dynamic checking is owned by a dedicated implementation issue"
forbidden_product_edges = ["workspace-member", "default-feature", "release-dependency", "build-script", "proc-macro", "package-example", "debug-symbol"]
enabled = false

