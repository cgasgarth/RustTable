schema = "rusttable.compiler-channel-exceptions.v1"
version = 1

[policy]
required_fields = ["id", "channel", "fingerprint", "command", "reproducer", "owner", "first_seen", "platforms", "risk", "expires"]
rolling_beta_max_days = 7
current_nightly_max_days = 30
pinned_lab_allowed = false
unused_is_error = true
fingerprint_mismatch_is_error = true

# Exceptions are intentionally empty on the initial policy rollout. Add one
# only with a minimized reproducer, an exact compiler fingerprint, and an
# owning issue.
