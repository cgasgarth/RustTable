version = 1
max_path_length = 240
case_collision_policy = "reject"
unicode_normalization = "nfc"
symlink_policy = "reject"

# A root entry means files directly under the repository root.  The other
# entries are repository-relative directory prefixes; the crate wildcard is
# intentionally limited to RustTable-owned crates.
governed_roots = [
    "<root>",
    "crates/rusttable-*",
    "crates/xtask",
    "architecture",
    "quality",
    "scripts",
    "shaders",
    "fixtures",
]

allowed_extensions = [
    "arw", "avif", "b64", "cr2", "db", "dng", "dt", "env", "exr", "fixture", "gz",
    "gitattributes", "gitignore", "hdr", "heif", "icc", "jp2", "jpg", "json",
    "jxl", "lock", "mailmap", "md", "nef", "orf", "pfm", "png", "raf", "raw",
    "rs", "rw2", "sh", "tiff", "toml", "ts", "lcov", "lua", "webp", "wit", "xmp", "yaml", "yml", "zip",
]

allowed_filenames = [".gitattributes", ".gitignore", ".gitkeep", ".mailmap", "AUTHORS", "LICENSE"]
empty_filenames = [".gitkeep"]

# These classes are intentionally extension based so a binary fixture is
# skipped before UTF-8, line-ending, or final-newline inspection.
binary_extensions = [
    "arw", "avif", "cr2", "db", "dng", "dt", "exr", "gz", "hdr", "heif", "icc",
    "jp2", "jpg", "jxl", "nef", "orf", "pfm", "png", "raf", "raw", "rw2", "tiff",
    "webp", "zip",
]
binary_filenames = []

# Git index modes are checked, not the host filesystem's executable bit.
executable_paths = [
    "scripts/bun-pin.sh",
    "scripts/check-bun-toolchain-policy.sh",
    "scripts/check-compiler-baseline-surfaces.sh",
    "scripts/check-native-removal.sh",
    "scripts/check-source-policy.sh",
    "scripts/dependency-security.sh",
    "scripts/dev/doctor.sh",
    "scripts/dev/test-doctor.sh",
    "scripts/dev/test-readme-contract.sh",
    "scripts/linux-distribution-smoke.sh",
    "scripts/macos-distribution-smoke.sh",
    "scripts/main-ci.sh",
    "scripts/performance-budgets.sh",
    "scripts/pr-ci.sh",
    "scripts/precommit-fast.sh",
    "scripts/prepush-fast.sh",
    "scripts/rust-baseline.sh",
    "scripts/test-bun-pin.sh",
    "scripts/test-dependency-security.sh",
    "scripts/test-linux-distribution-smoke.sh",
    "scripts/test-native-removal.sh",
    "scripts/test-validation-budgets.sh",
    "scripts/validate-package-manifest.ts",
    "scripts/with-validation-budget.sh",
]

manifest_extensions = ["json", "toml", "yaml", "yml"]
reserved_windows_names = [
    "CON", "PRN", "AUX", "NUL",
    "COM1", "COM2", "COM3", "COM4", "COM5", "COM6", "COM7", "COM8", "COM9",
    "LPT1", "LPT2", "LPT3", "LPT4", "LPT5", "LPT6", "LPT7", "LPT8", "LPT9",
]

max_path_bytes = 240
max_path_utf16 = 240
max_component_bytes = 255
max_component_utf16 = 255

attributes_rules = [
    "/crates/rusttable-*/** text eol=lf",
    "/crates/xtask/** text eol=lf",
    "/fixtures/**/*.png binary",
    "/quality/** text eol=lf",
]

[[artifact_classes]]
id = "structured-text"
kind = "text"
extensions = ["csv", "css", "html", "lcov", "lock", "lua", "md", "plist", "rs", "sh", "sql", "svg", "toml", "ts", "wat", "wgsl", "wit", "xml", "yaml", "yml"]
max_size_bytes = 16777216

[[artifact_classes]]
id = "json-receipt"
kind = "text"
extensions = ["json"]
max_size_bytes = 67108864

[[artifact_classes]]
id = "png-raster"
kind = "binary"
extensions = ["png"]
max_size_bytes = 67108864

[[artifact_classes]]
id = "reviewed-compatibility-raster"
kind = "binary"
paths = ["fixtures/corpus/assets/raster-jpeg-12.jpg"]
max_size_bytes = 67108864

[[artifact_classes]]
id = "jpeg-raster"
kind = "binary"
extensions = ["jpg"]
max_size_bytes = 67108864

[[artifact_classes]]
id = "wasm-module"
kind = "binary"
extensions = ["wasm"]
max_size_bytes = 67108864

[[magic_signatures]]
extension = "png"
offset = 0
bytes = "89504e470d0a1a0a"

[[magic_signatures]]
extension = "jpg"
offset = 0
bytes = "ffd8ff"

[[magic_signatures]]
extension = "wasm"
offset = 0
bytes = "0061736d"
