edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
iced = { version = "0.14.0", default-features = false, features = ["advanced", "sipper", "thread-pool", "tiny-skia", "wgpu", "x11"] }
