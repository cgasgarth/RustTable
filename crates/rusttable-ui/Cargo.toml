[package]
name = "rusttable-ui"
description = "Reusable Iced widgets, input, navigation, theme, and presentation models for RustTable."
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
# Keep the reviewed Iced 0.15.0-dev development-line revision reproducible.
iced = { git = "https://github.com/iced-rs/iced.git", rev = "56b706fcd35aa881baede77a696bbb842773fdc6", default-features = false, features = ["advanced", "sipper", "thread-pool", "tiny-skia", "wgpu", "x11"] }
rusttable-core = { path = "../rusttable-core", version = "0.1.0" }

[dev-dependencies]
iced_test = { git = "https://github.com/iced-rs/iced.git", rev = "56b706fcd35aa881baede77a696bbb842773fdc6" }

[lints]
workspace = true
