[package]
name = "rusttable-ui"
description = "Reusable Iced widgets, input, navigation, theme, and presentation models for RustTable."
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
rusttable-core = { path = "../rusttable-core", version = "0.1.0" }

[dev-dependencies]
iced_test.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
iced = { workspace = true, features = ["x11"] }

[target.'cfg(not(target_os = "linux"))'.dependencies]
iced.workspace = true

[lints]
workspace = true
