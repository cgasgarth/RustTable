[package]
name = "xtask"
description = "Typed RustTable repository automation command surface."
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
rusttable-parity = { path = "../rusttable-parity", version = "0.1.0" }
rusttable-testkit = { path = "../rusttable-testkit", version = "0.1.0" }
serde = { version = "=1.0.228", features = ["derive"] }
