# linked; the checker excludes only this fixture directory and unit tests feed
# their contents through the same source scanner used for product files.
schema = "rusttable.native-boundary-fixtures.v1"
patterns = ["c-source", "cxx-source", "cmake", "build-script", "ffi", "bindgen", "raw-handle", "reference-path", "unsafe-suppression", "adapter-edge"]
