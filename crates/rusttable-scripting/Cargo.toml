[package]
name = "rusttable-scripting"
description = "Bounded, capability-based Lua 5.4 scripting host for RustTable."
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true

[features]
default = ["lua54-vendored"]
lua54-vendored = ["mlua/lua54", "mlua/vendored"]
lua54-system = ["mlua/lua54"]

[dependencies]
futures = "=0.3.32"
mlua = { version = "=0.11.4", default-features = false, features = ["async", "serialize"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
sha2 = { version = "0.10.9", default-features = false }

[lints]
workspace = true
