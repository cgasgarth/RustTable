# Authoritative local workspace ownership and dependency direction.
# Future target edges are explicit with required = false until their owning
# subsystem is implemented; no placeholder Cargo dependencies are introduced.
schema_version = 3
composition_root = "rusttable-app"
tooling_packages = ["rusttable-parity", "rusttable-testkit", "xtask"]

[[packages]]
name = "rusttable-app"
manifest = "crates/rusttable-app/Cargo.toml"
role = "composition-root"
integration_owner = "rusttable-app"

[[packages]]
name = "rusttable-camera"
manifest = "crates/rusttable-camera/Cargo.toml"
role = "product"
integration_owner = "rusttable-camera"

[[packages]]
name = "rusttable-catalog"
manifest = "crates/rusttable-catalog/Cargo.toml"
role = "product"
integration_owner = "rusttable-catalog"

[[packages]]
name = "rusttable-catalog-store"
manifest = "crates/rusttable-catalog-store/Cargo.toml"
role = "product"
integration_owner = "rusttable-catalog"

[[packages]]
name = "rusttable-color"
manifest = "crates/rusttable-color/Cargo.toml"
role = "product"
integration_owner = "rusttable-color"

[[packages]]
name = "rusttable-compat"
manifest = "crates/rusttable-compat/Cargo.toml"
role = "product"
integration_owner = "rusttable-compat"

[[packages]]
name = "rusttable-core"
manifest = "crates/rusttable-core/Cargo.toml"
role = "product"
integration_owner = "rusttable-core"

[[packages]]
name = "rusttable-diagnostics"
manifest = "crates/rusttable-diagnostics/Cargo.toml"
role = "product"
integration_owner = "rusttable-app"

[[packages]]
name = "rusttable-export"
manifest = "crates/rusttable-export/Cargo.toml"
role = "product"
integration_owner = "rusttable-export"

[[packages]]
name = "rusttable-gpu"
manifest = "crates/rusttable-gpu/Cargo.toml"
role = "product"
integration_owner = "rusttable-gpu"

[[packages]]
name = "rusttable-image"
manifest = "crates/rusttable-image/Cargo.toml"
role = "product"
integration_owner = "rusttable-image"

[[packages]]
name = "rusttable-image-io"
manifest = "crates/rusttable-image-io/Cargo.toml"
role = "product"
integration_owner = "rusttable-import"

[[packages]]
name = "rusttable-import"
manifest = "crates/rusttable-import/Cargo.toml"
role = "product"
integration_owner = "rusttable-import"

[[packages]]
name = "rusttable-masks"
manifest = "crates/rusttable-masks/Cargo.toml"
role = "product"
integration_owner = "rusttable-masks"

[[packages]]
name = "rusttable-metadata"
manifest = "crates/rusttable-metadata/Cargo.toml"
role = "product"
integration_owner = "rusttable-metadata"

[[packages]]
name = "rusttable-parity"
manifest = "crates/rusttable-parity/Cargo.toml"
role = "tooling"
integration_owner = "rusttable-parity"

[[packages]]
name = "rusttable-pixelpipe"
manifest = "crates/rusttable-pixelpipe/Cargo.toml"
role = "product"
integration_owner = "rusttable-pixelpipe"

[[packages]]
name = "rusttable-plugin-api"
manifest = "crates/rusttable-plugin-api/Cargo.toml"
role = "product"
integration_owner = "rusttable-plugin-api"

[[packages]]
name = "rusttable-processing"
manifest = "crates/rusttable-processing/Cargo.toml"
role = "product"
integration_owner = "rusttable-processing"

[[packages]]
name = "rusttable-render"
manifest = "crates/rusttable-render/Cargo.toml"
role = "product"
integration_owner = "rusttable-render"

[[packages]]
name = "rusttable-scripting"
manifest = "crates/rusttable-scripting/Cargo.toml"
role = "product"
integration_owner = "rusttable-app"
features = ["lua54-vendored", "lua54-system"]
feature_sets = [["lua54-vendored", "lua54-system"]]

[[packages]]
name = "rusttable-simd"
manifest = "crates/rusttable-simd/Cargo.toml"
role = "product"
integration_owner = "rusttable-simd"

[[packages]]
name = "rusttable-testkit"
manifest = "crates/rusttable-testkit/Cargo.toml"
role = "tooling"
integration_owner = "rusttable-testkit"

[[packages]]
name = "rusttable-ui"
manifest = "crates/rusttable-ui/Cargo.toml"
role = "product"
integration_owner = "rusttable-app"

[[packages]]
name = "xtask"
manifest = "crates/xtask/Cargo.toml"
role = "tooling"
integration_owner = "xtask"

