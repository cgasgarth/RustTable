# Authoritative local workspace ownership and dependency direction.
# Keep package names and manifest paths synchronized with Cargo metadata.
schema_version = 2
composition_root = "rusttable-app"
tooling_packages = ["rusttable-parity", "rusttable-testkit", "xtask"]

[[packages]]
name = "rusttable-app"
manifest = "crates/rusttable-app/Cargo.toml"
role = "composition-root"

[[packages]]
name = "rusttable-catalog"
manifest = "crates/rusttable-catalog/Cargo.toml"
role = "product"

[[packages]]
name = "rusttable-catalog-store"
manifest = "crates/rusttable-catalog-store/Cargo.toml"
role = "product"

[[packages]]
name = "rusttable-core"
manifest = "crates/rusttable-core/Cargo.toml"
role = "product"

[[packages]]
name = "rusttable-diagnostics"
manifest = "crates/rusttable-diagnostics/Cargo.toml"
role = "product"

[[packages]]
name = "rusttable-export"
manifest = "crates/rusttable-export/Cargo.toml"
role = "product"

[[packages]]
name = "rusttable-image"
manifest = "crates/rusttable-image/Cargo.toml"
role = "product"

[[packages]]
name = "rusttable-image-io"
manifest = "crates/rusttable-image-io/Cargo.toml"
role = "product"

[[packages]]
name = "rusttable-import"
manifest = "crates/rusttable-import/Cargo.toml"
role = "product"

[[packages]]
name = "rusttable-metadata"
manifest = "crates/rusttable-metadata/Cargo.toml"
role = "product"

[[packages]]
name = "rusttable-parity"
manifest = "crates/rusttable-parity/Cargo.toml"
role = "tooling"

[[packages]]
name = "rusttable-processing"
manifest = "crates/rusttable-processing/Cargo.toml"
role = "product"

[[packages]]
name = "rusttable-render"
manifest = "crates/rusttable-render/Cargo.toml"
role = "product"

[[packages]]
name = "rusttable-scripting"
manifest = "crates/rusttable-scripting/Cargo.toml"
role = "product"
features = ["lua54-vendored", "lua54-system"]
feature_sets = [["lua54-vendored", "lua54-system"]]

[[packages]]
name = "rusttable-testkit"
manifest = "crates/rusttable-testkit/Cargo.toml"
role = "tooling"

[[packages]]
name = "rusttable-ui"
manifest = "crates/rusttable-ui/Cargo.toml"
role = "product"

[[packages]]
name = "xtask"
manifest = "crates/xtask/Cargo.toml"
role = "tooling"

# Every edge is intentionally explicit. `dev` owns the import integration
# tests; it is not a second production path.
[[edges]]
from = "rusttable-app"
to = "rusttable-catalog"

[[edges]]
from = "rusttable-app"
to = "rusttable-catalog-store"

[[edges]]
from = "rusttable-app"
to = "rusttable-core"

[[edges]]
from = "rusttable-app"
to = "rusttable-diagnostics"

[[edges]]
from = "rusttable-app"
to = "rusttable-image"

[[edges]]
from = "rusttable-app"
to = "rusttable-ui"

[[edges]]
from = "rusttable-app"
to = "rusttable-scripting"

[[edges]]
from = "rusttable-catalog"
to = "rusttable-core"

[[edges]]
from = "rusttable-catalog"
to = "rusttable-image"

[[edges]]
from = "rusttable-catalog-store"
to = "rusttable-catalog"

[[edges]]
from = "rusttable-catalog-store"
to = "rusttable-core"

[[edges]]
from = "rusttable-catalog-store"
to = "rusttable-image"

[[edges]]
from = "rusttable-image-io"
to = "rusttable-image"

[[edges]]
from = "rusttable-image-io"
to = "rusttable-metadata"

[[edges]]
from = "rusttable-import"
to = "rusttable-catalog"

[[edges]]
from = "rusttable-import"
to = "rusttable-core"

[[edges]]
from = "rusttable-import"
to = "rusttable-image"

[[edges]]
from = "rusttable-import"
to = "rusttable-metadata"

[[edges]]
from = "rusttable-import"
to = "rusttable-catalog-store"
kind = "dev"

[[edges]]
from = "rusttable-metadata"
to = "rusttable-core"

[[edges]]
from = "rusttable-metadata"
to = "rusttable-image"

[[edges]]
from = "rusttable-processing"
to = "rusttable-core"

[[edges]]
from = "rusttable-render"
to = "rusttable-core"

[[edges]]
from = "rusttable-render"
to = "rusttable-image"

[[edges]]
from = "rusttable-render"
to = "rusttable-processing"

[[edges]]
from = "rusttable-ui"
to = "rusttable-core"

[[edges]]
from = "rusttable-export"
to = "rusttable-core"

[[edges]]
from = "xtask"
to = "rusttable-parity"

[[edges]]
from = "rusttable-parity"
to = "rusttable-testkit"

[[edges]]
from = "xtask"
to = "rusttable-testkit"

[[edges]]
from = "xtask"
to = "rusttable-scripting"

[[edges]]
from = "xtask"
to = "rusttable-core"

# Direct third-party ownership is explicit. The source is deliberately exact so
# a registry/git/path provenance change requires an architecture review.
[[external_dependencies]]
package = "clap"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["xtask"]

[[external_dependencies]]
package = "directories"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["rusttable-app", "rusttable-diagnostics"]

[[external_dependencies]]
package = "futures"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["rusttable-scripting"]

[[external_dependencies]]
package = "flate2"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["rusttable-testkit"]

[[external_dependencies]]
package = "iced"
source = "git+https://github.com/iced-rs/iced.git?rev=56b706fcd35aa881baede77a696bbb842773fdc6#56b706fcd35aa881baede77a696bbb842773fdc6"
source_packages = ["rusttable-app", "rusttable-ui"]

[[external_dependencies]]
package = "iced_test"
source = "git+https://github.com/iced-rs/iced.git?rev=56b706fcd35aa881baede77a696bbb842773fdc6#56b706fcd35aa881baede77a696bbb842773fdc6"
source_packages = ["rusttable-app", "rusttable-ui"]
kinds = ["dev"]

[[external_dependencies]]
package = "image"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["rusttable-image-io"]

[[external_dependencies]]
package = "kamadak-exif"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["rusttable-metadata"]

[[external_dependencies]]
package = "mlua"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["rusttable-scripting"]

[[external_dependencies]]
package = "postcard"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["rusttable-catalog-store"]

[[external_dependencies]]
package = "redb"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["rusttable-catalog-store"]

[[external_dependencies]]
package = "serde"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["rusttable-catalog-store", "rusttable-parity", "rusttable-scripting", "rusttable-testkit", "xtask"]

[[external_dependencies]]
package = "serde_json"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["rusttable-parity", "rusttable-scripting", "rusttable-testkit", "xtask"]

[[external_dependencies]]
package = "sha2"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["rusttable-core", "rusttable-export", "rusttable-import", "rusttable-parity", "rusttable-scripting", "rusttable-testkit", "xtask"]

[[external_dependencies]]
package = "toml"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["rusttable-parity", "rusttable-testkit", "xtask"]

[[external_dependencies]]
package = "unicode-normalization-alignments"
source = "registry+https://github.com/rust-lang/crates.io-index"
source_packages = ["rusttable-core", "xtask"]
