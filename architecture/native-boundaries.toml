# RustTable stays Rust-owned. This policy is intentionally human-readable; the
# compiler lint and cargo xtask check are the executable enforcement surfaces.
schema = "rusttable.native-boundaries.v2"
unsafe_code = "forbid"
reference_repository = "darktable-org/darktable"
reference_commit = "cfe57f3bbf5269bfacf31e832267279caa6938ad"

forbidden_source_extensions = [
  "c", "cc", "cl", "cmake", "cpp", "cxx", "h", "hh", "hpp", "m", "mm", "s",
]
forbidden_build_files = ["CMakeLists.txt", "ConfigureChecks.cmake"]
forbidden_direct_dependencies = ["bindgen", "cc", "cmake", "libloading", "pkg-config"]

# Native transitive dependencies owned by maintained Rust crates are acceptable.
# A direct FFI adapter requires a focused issue, a safe public API, documented
# invariants, deterministic cleanup, and tests before this file is amended.
