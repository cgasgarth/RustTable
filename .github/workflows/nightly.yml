name: Extended validation

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: extended-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  coverage:
    name: Linux / coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libgtk-4-dev libheif-dev nasm
          nasm --version
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: rust-coverage-0.6.16-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
      - name: Install coverage tool
        shell: bash
        run: |
          cargo llvm-cov --version 2>/dev/null | grep -F '0.6.16' ||
            cargo install cargo-llvm-cov --version 0.6.16 --locked
      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-features --locked --lcov --output-path target/coverage/lcov.info
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: rusttable-coverage-${{ github.sha }}
          path: target/coverage/lcov.info
          if-no-files-found: error
  distribution:
    name: ${{ matrix.name }} / distribution smoke
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-24.04
          - name: macOS
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Install Linux native dependencies
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libgtk-4-dev libheif-dev nasm
          nasm --version
      - name: Install macOS native dependencies
        if: matrix.name == 'macOS'
        run: brew install gtk4 libheif
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-dist-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock', 'bun.lock') }}
      - name: Build and verify distribution
        run: cargo xtask dist
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: rusttable-${{ runner.os }}-${{ github.sha }}
          path: |
            target/distribution/*.zip
            target/distribution/*.sha256
            target/linux-distribution/*.tar.gz
            target/linux-distribution/*.sha256
          if-no-files-found: error
