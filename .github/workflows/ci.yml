name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  NEXTEST_VERSION: "0.9.140"

jobs:
  linux:
    name: Linux / fmt, Clippy, product data
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libgtk-4-dev libnuma-dev nasm
          dpkg-query -W -f='${Status}\n' libnuma-dev | grep -Fx 'install ok installed'
          nasm --version
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-linux-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
      - name: Install pinned toolchain
        run: rustup show active-toolchain
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Verify generated operations
        run: cargo xtask codegen operations --check
      - name: Verify fixture corpus
        run: cargo xtask fixtures verify

  tests:
    name: ${{ matrix.platform }} / nextest shard ${{ matrix.shard }}/2
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux
            runner: ubuntu-24.04
          - platform: macOS
            runner: macos-15
          - platform: Windows
            runner: windows-2025
        shard: [1, 2]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install Linux native dependencies
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libgtk-4-dev libnuma-dev nasm
          dpkg-query -W -f='${Status}\n' libnuma-dev | grep -Fx 'install ok installed'
          nasm --version
      - name: Install macOS native dependencies
        if: matrix.platform == 'macOS'
        run: brew install gtk4
      - name: Install Windows native dependencies
        if: matrix.platform == 'Windows'
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = 'C:\vcpkg'
          "VCPKG_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV
          & "$env:VCPKG_ROOT\vcpkg.exe" install libheif:x64-windows-static-md
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: rust-nextest-${{ matrix.platform }}-${{ env.NEXTEST_VERSION }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
      - name: Install pinned toolchain
        run: rustup show active-toolchain
      - name: Check workspace
        run: cargo check --workspace --all-targets --all-features --locked
      - name: Install pinned cargo-nextest
        shell: bash
        run: |
          if ! cargo nextest --version 2>/dev/null | grep -Fxq "cargo-nextest ${NEXTEST_VERSION}"; then
            cargo install cargo-nextest --version "${NEXTEST_VERSION}" --locked
          fi
          test "$(cargo nextest --version)" = "cargo-nextest ${NEXTEST_VERSION}"
      - name: Run nextest shard
        run: cargo nextest run --workspace --all-features --locked --profile ci --partition "hash:${{ matrix.shard }}/2"
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: rusttable-nextest-${{ matrix.platform }}-shard-${{ matrix.shard }}-${{ github.sha }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn
          retention-days: 14

  dependencies:
    name: Dependencies / advisories, licenses, sources
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: rust-dependencies-deny-0.19.8-${{ hashFiles('Cargo.lock', 'deny.toml') }}
      - name: Install standard dependency tools
        shell: bash
        run: |
          cargo deny --version 2>/dev/null | grep -F '0.19.8' ||
            cargo install cargo-deny --version 0.19.8 --locked
      - name: Check advisories, licenses, and sources
        run: cargo deny check --hide-inclusion-graph advisories bans licenses sources
