name: RustTable PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: rust-pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-groups:
    name: rust-pr / ${{ matrix.group }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        group:
          - repository
          - rust-01-test
    env:
      RUSTTABLE_CI_GROUP: ${{ matrix.group }}
    defaults:
      run:
        shell: bash scripts/with-validation-budget.sh 150 workflow-step bash {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Read canonical Bun pin
        id: bun-pin
        run: bash scripts/bun-pin.sh "$GITHUB_WORKSPACE" >> "$GITHUB_OUTPUT"
      - name: Set up exact Rust toolchain
        run: |
          rustup toolchain install "$(bash scripts/rust-baseline.sh channel)" --profile minimal --no-self-update
          rustup default "$(bash scripts/rust-baseline.sh channel)"
          test "$(rustup show active-toolchain | awk '{print $1}')" = "$(bash scripts/rust-baseline.sh channel)-x86_64-unknown-linux-gnu"
      - name: Set up exact Bun toolchain
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: ${{ steps.bun-pin.outputs.bun-version }}
      - name: Verify canonical Bun version
        run: test "$(bun --version)" = "${{ steps.bun-pin.outputs.bun-version }}"
      - name: Restore Cargo cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-main-${{ runner.os }}-rust-baseline-${{ hashFiles('rust-toolchain.toml', 'quality/compiler-baseline.toml') }}-${{ hashFiles('Cargo.lock', 'package.json') }}
          restore-keys: |
            rust-main-${{ runner.os }}-rust-baseline-${{ hashFiles('rust-toolchain.toml', 'quality/compiler-baseline.toml') }}-
            rust-linux-distribution-${{ runner.os }}-rust-baseline-${{ hashFiles('rust-toolchain.toml', 'quality/compiler-baseline.toml') }}-
      - name: Fetch locked dependencies for offline validation
        run: cargo fetch --locked
      - name: Warm PR test runner artifacts
        if: matrix.group == 'rust-01-test'
        run: |
          CARGO_BUILD_JOBS=16 \
          CARGO_INCREMENTAL=0 \
          CARGO_PROFILE_DEV_DEBUG=0 \
          CARGO_PROFILE_TEST_DEBUG=0 \
          cargo test -p rusttable-scripting --lib --all-features --locked --no-run
      - name: Start validation timer
        run: echo "RUSTTABLE_VALIDATION_START=$(date +%s)" >> "$GITHUB_ENV"
      - name: Run parallel PR validation group
        run: bash scripts/pr-ci.sh
      - name: Enforce 150-second validation budget
        if: always()
        run: |
          end_seconds="$(date +%s)"
          elapsed_seconds=$((end_seconds - RUSTTABLE_VALIDATION_START))
          echo "validation duration: ${elapsed_seconds}s (budget: 150s)"
          if (( elapsed_seconds > 150 )); then
            echo "validation budget exceeded" >&2
            exit 1
          fi

  validate:
    name: rust-pr / validate
    if: ${{ always() }}
    needs: validate-groups
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Require every parallel validation group to pass
        run: |
          echo "parallel validation result: ${{ needs.validate-groups.result }}"
          if [[ "${{ needs.validate-groups.result }}" != success ]]; then
            echo "one or more parallel PR validation groups failed" >&2
            exit 1
          fi
