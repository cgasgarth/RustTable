name: Release artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  dist:
    name: ${{ matrix.name }} / unsigned artifact
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-24.04
          - name: macOS
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Install Linux native dependencies
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libgtk-4-dev libheif-dev nasm
          nasm --version
      - name: Install macOS native dependencies
        if: matrix.name == 'macOS'
        run: brew install gtk4 libheif
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-release-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock', 'bun.lock') }}
      - name: Build and verify distribution
        run: cargo xtask dist
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: rusttable-${{ runner.os }}-${{ github.ref_name }}
          path: |
            target/distribution/*.zip
            target/distribution/*.sha256
            target/linux-distribution/*.tar.gz
            target/linux-distribution/*.sha256
          if-no-files-found: error
