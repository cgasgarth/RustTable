name: RustTable Main

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: rust-main-${{ github.sha }}
  cancel-in-progress: false

jobs:
  platform-matrix:
    name: repository / supported platforms
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        shell: bash scripts/with-validation-budget.sh 2700 workflow-step bash {0}
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version-file: package.json
      - name: Read supported target matrix
        id: targets
        run: echo "targets=$(bun scripts/platform-support.ts --json)" >> "$GITHUB_OUTPUT"

  rolling-beta:
    name: compiler / rolling beta
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash scripts/with-validation-budget.sh 2700 workflow-step bash {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up primary command toolchain
        run: rustup toolchain install "$(bash scripts/rust-baseline.sh channel)" --profile minimal --no-self-update --component clippy --component rust-docs --component rust-src --component rustfmt --component llvm-tools-preview
      - name: Set up rolling beta
        run: rustup toolchain install beta --profile minimal --no-self-update --component clippy --component rust-docs --component rust-src --component rustfmt --component llvm-tools-preview
      - name: Capture rolling beta fingerprint
        id: compiler-fingerprint
        run: echo "sha=$(rustup run beta rustc -vV | sha256sum | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Restore rolling beta Cargo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-main-rolling-beta-${{ steps.compiler-fingerprint.outputs.sha }}-${{ hashFiles('Cargo.lock', 'quality/rust-channels.toml') }}
      - name: Verify rolling beta compatibility
        run: cargo +"$(bash scripts/rust-baseline.sh channel)" xtask ecosystem channels verify --channel rolling-beta --receipt target/compiler-channels/rolling-beta.json
      - name: Upload rolling beta receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rusttable-compiler-rolling-beta-${{ github.sha }}
          path: target/compiler-channels/rolling-beta.json
          if-no-files-found: warn

  previous-stable-sentinels:
    name: compiler / previous stable sentinels
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash scripts/with-validation-budget.sh 2700 workflow-step bash {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up primary command toolchain
        run: rustup toolchain install "$(bash scripts/rust-baseline.sh channel)" --profile minimal --no-self-update --component clippy --component rust-docs --component rust-src --component rustfmt --component llvm-tools-preview
      - name: Set up previous stable
        run: rustup toolchain install 1.97.1 --profile minimal --no-self-update --component clippy --component rustfmt
      - name: Capture previous stable fingerprint
        id: compiler-fingerprint
        run: echo "sha=$(rustup run 1.97.1 rustc -vV | sha256sum | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Restore previous stable Cargo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-main-previous-stable-${{ steps.compiler-fingerprint.outputs.sha }}-${{ hashFiles('Cargo.lock', 'quality/rust-channels.toml') }}
      - name: Verify previous stable sentinels
        run: cargo +"$(bash scripts/rust-baseline.sh channel)" xtask ecosystem channels verify --channel previous-stable --receipt target/compiler-channels/previous-stable.json
      - name: Upload previous stable receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rusttable-compiler-previous-stable-${{ github.sha }}
          path: target/compiler-channels/previous-stable.json
          if-no-files-found: warn

  current-nightly:
    name: compiler / current nightly
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash scripts/with-validation-budget.sh 2700 workflow-step bash {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up primary command toolchain
        run: rustup toolchain install "$(bash scripts/rust-baseline.sh channel)" --profile minimal --no-self-update --component clippy --component rust-docs --component rust-src --component rustfmt --component llvm-tools-preview
      - name: Set up current nightly
        run: rustup toolchain install nightly --profile minimal --no-self-update --component clippy --component rust-docs --component rust-src --component rustfmt
      - name: Capture current nightly fingerprint
        id: compiler-fingerprint
        run: echo "sha=$(rustup run nightly rustc -vV | sha256sum | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Restore current nightly Cargo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-main-current-nightly-${{ steps.compiler-fingerprint.outputs.sha }}-${{ hashFiles('Cargo.lock', 'quality/rust-channels.toml') }}
      - name: Verify current nightly compatibility
        run: cargo +"$(bash scripts/rust-baseline.sh channel)" xtask ecosystem channels verify --channel current-nightly --receipt target/compiler-channels/current-nightly.json
      - name: Upload current nightly receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rusttable-compiler-current-nightly-${{ github.sha }}
          path: target/compiler-channels/current-nightly.json
          if-no-files-found: warn

  pinned-nightly-lab:
    name: compiler / pinned nightly lab
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash scripts/with-validation-budget.sh 2700 workflow-step bash {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up primary command toolchain
        run: rustup toolchain install "$(bash scripts/rust-baseline.sh channel)" --profile minimal --no-self-update --component clippy --component rust-docs --component rust-src --component rustfmt --component llvm-tools-preview
      - name: Set up pinned nightly lab toolchain
        run: rustup toolchain install nightly-2026-07-15 --profile minimal --no-self-update --component clippy --component rust-src --component rustfmt
      - name: Capture pinned lab fingerprint
        id: compiler-fingerprint
        run: echo "sha=$(rustup run nightly-2026-07-15 rustc -vV | sha256sum | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Restore pinned lab Cargo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-main-pinned-nightly-lab-${{ steps.compiler-fingerprint.outputs.sha }}-${{ hashFiles('Cargo.lock', 'quality/rust-channels.toml', 'quality/nightly-labs.toml') }}
      - name: Verify pinned nightly labs
        run: cargo +"$(bash scripts/rust-baseline.sh channel)" xtask ecosystem channels verify --channel pinned-nightly-lab --receipt target/compiler-channels/pinned-nightly-lab.json
      - name: Upload pinned lab receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rusttable-compiler-pinned-nightly-lab-${{ github.sha }}
          path: target/compiler-channels/pinned-nightly-lab.json
          if-no-files-found: warn

  full:
    name: linux / full validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash scripts/with-validation-budget.sh 2700 workflow-step bash {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Read canonical Bun pin
        id: bun-pin
        run: bash scripts/bun-pin.sh "$GITHUB_WORKSPACE" >> "$GITHUB_OUTPUT"
      - name: Set up exact Rust toolchain
        run: |
          rustup toolchain install "$(bash scripts/rust-baseline.sh channel)" --profile minimal --no-self-update --component clippy --component rust-docs --component rust-src --component rustfmt --component llvm-tools-preview
          rustup default "$(bash scripts/rust-baseline.sh channel)"
          test "$(rustup show active-toolchain | awk '{print $1}')" = "$(bash scripts/rust-baseline.sh channel)-x86_64-unknown-linux-gnu"
      - name: Set up exact Bun toolchain
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: ${{ steps.bun-pin.outputs.bun-version }}
      - name: Verify primary package provenance
        run: cargo xtask ecosystem channels verify --channel primary-beta --artifact --receipt target/compiler-channels/primary-beta.json
      - name: Verify canonical Bun version
        run: test "$(bun --version)" = "${{ steps.bun-pin.outputs.bun-version }}"
      - name: Restore Linux Cargo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-main-Linux-rust-baseline-${{ hashFiles('rust-toolchain.toml', 'quality/compiler-baseline.toml') }}-${{ hashFiles('Cargo.lock', 'package.json') }}
      - name: Run Linux full validation
        run: bash scripts/main-ci.sh
      - name: Verify workflow inventory
        run: cargo xtask repo verify-workflows

  portable-tests:
    name: ${{ matrix.os }} / workspace tests
    needs: platform-matrix
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    defaults:
      run:
        shell: bash scripts/with-validation-budget.sh 2700 workflow-step bash {0}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.platform-matrix.outputs.targets) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up exact Rust toolchain
        run: |
          rustup toolchain install "$(bash scripts/rust-baseline.sh channel)" --profile minimal --no-self-update --component clippy --component rust-docs --component rust-src --component rustfmt --component llvm-tools-preview
          rustup default "$(bash scripts/rust-baseline.sh channel)"
          active_toolchain="$(rustup show active-toolchain | awk '{print $1}')"
          [[ "$active_toolchain" == $(bash scripts/rust-baseline.sh channel)-* ]]
      - name: Restore portable Cargo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-main-${{ matrix.triple }}-rust-baseline-${{ hashFiles('rust-toolchain.toml', 'quality/compiler-baseline.toml') }}-${{ hashFiles('Cargo.lock') }}
      - name: Run portable workspace tests
        run: cargo test --workspace --all-targets --all-features --locked

  dependency-security:
    name: linux / dependency security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash scripts/with-validation-budget.sh 2700 workflow-step bash {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Read canonical Bun pin
        id: bun-pin
        run: bash scripts/bun-pin.sh "$GITHUB_WORKSPACE" >> "$GITHUB_OUTPUT"
      - name: Set up exact Rust toolchain
        run: |
          rustup toolchain install "$(bash scripts/rust-baseline.sh channel)" --profile minimal --no-self-update --component clippy --component rust-docs --component rust-src --component rustfmt --component llvm-tools-preview
          rustup default "$(bash scripts/rust-baseline.sh channel)"
          test "$(rustup show active-toolchain | awk '{print $1}')" = "$(bash scripts/rust-baseline.sh channel)-x86_64-unknown-linux-gnu"
      - name: Set up exact Bun toolchain
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: ${{ steps.bun-pin.outputs.bun-version }}
      - name: Verify primary package provenance
        run: cargo xtask ecosystem channels verify --channel primary-beta --artifact --receipt target/compiler-channels/primary-beta.json
      - name: Verify canonical Bun version
        run: test "$(bun --version)" = "${{ steps.bun-pin.outputs.bun-version }}"
      - name: Restore security tool cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-audit
            ~/.cargo/bin/cargo-deny
            ~/.cargo/advisory-dbs
            target
          key: rust-security-Linux-rust-baseline-${{ hashFiles('rust-toolchain.toml', 'quality/compiler-baseline.toml') }}-audit-0.22.2-deny-0.19.8-${{ hashFiles('Cargo.lock', 'package.json') }}
      - name: Install exact security tools
        run: |
          cargo install cargo-audit --version 0.22.2 --locked --force
          cargo install cargo-deny --version 0.19.8 --locked --force
          test "$(cargo-audit --version)" = "cargo-audit 0.22.2"
          test "$(cargo-deny --version)" = "cargo-deny 0.19.8"
      - name: Run dependency security
        run: bash scripts/dependency-security.sh
      - name: Upload dependency security reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rusttable-dependency-security-${{ github.sha }}
          path: target/security/
          if-no-files-found: warn

  performance-budgets:
    name: linux / performance budgets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash scripts/with-validation-budget.sh 2700 workflow-step bash {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up exact Rust toolchain
        run: |
          rustup toolchain install "$(bash scripts/rust-baseline.sh channel)" --profile minimal --no-self-update --component clippy --component rust-docs --component rust-src --component rustfmt --component llvm-tools-preview
          rustup default "$(bash scripts/rust-baseline.sh channel)"
          test "$(rustup show active-toolchain | awk '{print $1}')" = "$(bash scripts/rust-baseline.sh channel)-x86_64-unknown-linux-gnu"
      - name: Restore benchmark cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-performance-Linux-rust-baseline-${{ hashFiles('rust-toolchain.toml', 'quality/compiler-baseline.toml') }}-${{ hashFiles('Cargo.lock') }}
      - name: Run performance budgets
        run: bash scripts/performance-budgets.sh
      - name: Upload performance evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rusttable-performance-${{ github.sha }}
          path: target/performance/results.log
          if-no-files-found: warn

  macos-distribution-smoke:
    name: macOS / distribution smoke
    runs-on: macos-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash scripts/with-validation-budget.sh 2700 workflow-step bash {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Read canonical Bun pin
        id: bun-pin
        run: bash scripts/bun-pin.sh "$GITHUB_WORKSPACE" >> "$GITHUB_OUTPUT"
      - name: Set up exact Rust toolchain
        run: |
          rustup toolchain install "$(bash scripts/rust-baseline.sh channel)" --profile minimal --no-self-update --component clippy --component rust-docs --component rust-src --component rustfmt --component llvm-tools-preview
          rustup default "$(bash scripts/rust-baseline.sh channel)"
          active_toolchain="$(rustup show active-toolchain | awk '{print $1}')"
          [[ "$active_toolchain" == $(bash scripts/rust-baseline.sh channel)-* ]]
      - name: Set up exact Bun toolchain
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: ${{ steps.bun-pin.outputs.bun-version }}
      - name: Verify primary package provenance
        run: cargo xtask ecosystem channels verify --channel primary-beta --artifact --receipt target/compiler-channels/primary-beta.json
      - name: Verify canonical Bun version
        run: test "$(bun --version)" = "${{ steps.bun-pin.outputs.bun-version }}"
      - name: Restore macOS Cargo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-distribution-${{ runner.os }}-rust-baseline-${{ hashFiles('rust-toolchain.toml', 'quality/compiler-baseline.toml') }}-${{ hashFiles('Cargo.lock', 'package.json') }}
      - name: Run bounded distribution smoke
        run: bash scripts/with-validation-budget.sh 600 macos-distribution-smoke bash scripts/macos-distribution-smoke.sh
      - name: Upload distribution evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rusttable-macos-distribution-${{ github.sha }}
          path: target/distribution/
          if-no-files-found: warn

  linux-distribution-smoke:
    name: Linux / x86_64 distribution smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash scripts/with-validation-budget.sh 2700 workflow-step bash {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Read canonical Bun pin
        id: bun-pin
        run: bash scripts/bun-pin.sh "$GITHUB_WORKSPACE" >> "$GITHUB_OUTPUT"
      - name: Set up exact Rust toolchain
        run: |
          rustup toolchain install "$(bash scripts/rust-baseline.sh channel)" --profile minimal --no-self-update --component clippy --component rust-docs --component rust-src --component rustfmt --component llvm-tools-preview
          rustup default "$(bash scripts/rust-baseline.sh channel)"
          test "$(rustup show active-toolchain | awk '{print $1}')" = "$(bash scripts/rust-baseline.sh channel)-x86_64-unknown-linux-gnu"
      - name: Verify primary package provenance
        run: cargo xtask ecosystem channels verify --channel primary-beta --artifact --receipt target/compiler-channels/primary-beta.json
      - name: Set up exact Bun toolchain
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: ${{ steps.bun-pin.outputs.bun-version }}
      - name: Verify canonical Bun version
        run: test "$(bun --version)" = "${{ steps.bun-pin.outputs.bun-version }}"
      - name: Restore Linux distribution Cargo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-linux-distribution-${{ runner.os }}-rust-baseline-${{ hashFiles('rust-toolchain.toml', 'quality/compiler-baseline.toml') }}-${{ hashFiles('Cargo.lock', 'package.json') }}
      - name: Run bounded Linux distribution smoke
        run: bash scripts/with-validation-budget.sh 600 linux-distribution-smoke bash scripts/linux-distribution-smoke.sh
      - name: Upload Linux distribution evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rusttable-linux-distribution-${{ github.sha }}
          path: target/linux-distribution/
          if-no-files-found: warn
